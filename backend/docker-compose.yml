version: '3.8'

services:
  # 1. PostgreSQL with pgvector support
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    networks:
      - aichat-network

  # 2. Qdrant Vector DB
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    ports:
      - "6333:6333"
    networks:
      - aichat-network

  # 3. Neo4j Graph DB
  neo4j:
    image: neo4j:latest
    container_name: neo4j_db
    environment:
      NEO4J_AUTH: neo4j/password123
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - aichat-network

  # 4. Your FastAPI Backend Application (If containerized)
  backend:
    build: .
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - qdrant
      - neo4j
    networks:
      - aichat-network

networks:
  aichat-network:
    driver: bridge